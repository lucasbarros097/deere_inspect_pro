version: "3.9"

services:
  web:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    env_file:
      - ../.env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/deere_inspect}

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deere_inspect}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./deployment/data/postgres:/var/lib/postgresql/data

